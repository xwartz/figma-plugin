name: 'Generate Labels'

on:
  pull_request:
    types:
      - opened
      - edited

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: 'Label PR based on title'
    runs-on: ubuntu-latest
    steps:
      - uses: srvaroa/labeler@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
