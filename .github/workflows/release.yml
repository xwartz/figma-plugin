name: release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare version and changelog
        id: release
        run: node scripts/prepare-release.mjs
        env:
          RELEASE_NOTES_PATH: ${{ runner.temp }}/release-notes.md

      - name: Build package
        if: steps.release.outputs.should_release == 'true'
        run: pnpm run build

      - name: Commit release changes
        if: steps.release.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.release.outputs.tag }} [skip ci]"
          git tag -a "${{ steps.release.outputs.tag }}" -m "${{ steps.release.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }} "${{ steps.release.outputs.tag }}"

      - name: Create GitHub release
        if: steps.release.outputs.should_release == 'true'
        run: gh release create "${{ steps.release.outputs.tag }}" ./dist/figma-plugin.zip --title "${{ steps.release.outputs.tag }}" --notes-file "${{ runner.temp }}/release-notes.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
